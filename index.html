<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>현대면세점 직원 소리함</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- ExcelJS & FileSaver (CDN 확인 완료) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: #f8fafc; 
            color: #1e293b;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .keep-all { word-break: keep-all; overflow-wrap: break-word; }
        input, textarea, select { font-size: 16px !important; }
        .modal-overlay { background-color: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px); }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes pop { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .loading-dots:after { content: '.'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); } 40% { color: #64748b; text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); } 60% { text-shadow: .25em 0 0 #64748b, .5em 0 0 rgba(0,0,0,0); } 80%, 100% { text-shadow: .25em 0 0 #64748b, .5em 0 0 #64748b; } }
        .toast-notify { animation: toast-in-out 3s ease-in-out forwards; }
        @keyframes toast-in-out { 0% { transform: translate(-50%, 20px); opacity: 0; } 15% { transform: translate(-50%, 0); opacity: 1; } 85% { transform: translate(-50%, 0); opacity: 1; } 100% { transform: translate(-50%, 20px); opacity: 0; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, getDoc, setDoc, deleteDoc, serverTimestamp, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.firebaseServices = { 
            initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken,
            getFirestore, collection, addDoc, doc, getDoc, setDoc, deleteDoc, serverTimestamp, onSnapshot, query 
        };
        window.dispatchEvent(new Event('firebase-initialized'));
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const APP_ID = "hyundai-voice-box-v8";
        const DEFAULT_PASSCODE = "HD6011";

        const App = () => {
            const [fb, setFb] = useState(null);
            const [user, setUser] = useState(null);
            const [initStatus, setInitStatus] = useState('loading');
            const [errorMessage, setErrorMessage] = useState('');

            // UI 상태
            const [view, setView] = useState('user'); 
            const [adminTab, setAdminTab] = useState('list'); 
            const [submissions, setSubmissions] = useState([]);
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');
            
            // 데이터 상태
            const [popupConfig, setPopupConfig] = useState({
                isActive: false, title: "위험 예방 제안 이벤트", subtitle: "여러분의 눈이 동료를 지킵니다",
                r1Title: "분기별 우수 의견", r1Value: "스벅 상품권 2만원권",
                r2Title: "연말 왕중왕 콘테스트", r2Value: "스벅 상품권 10만원권",
                popupImage: ""
            });
            const [adminPasscode, setAdminPasscode] = useState(DEFAULT_PASSCODE);

            // 입력/피드백
            const [formData, setFormData] = useState({ brandName:'', userName:'', contact:'', category:'위험예방', location:'', description:'', imageData:'' });
            const [passInput, setPassInput] = useState('');
            const [newPassField, setNewPassField] = useState('');
            const [toast, setToast] = useState(null);
            const [alertMsg, setAlertMsg] = useState(null);
            const [showPopup, setShowPopup] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [isSuccess, setIsSuccess] = useState(false);
            const [deleteTarget, setDeleteTarget] = useState(null);

            // 1. 초기화
            useEffect(() => {
                const init = async () => {
                    const svc = window.firebaseServices;
                    if (!svc) return;
                    try {
                        const config = {
                            apiKey: "AIzaSyBErG7ZouUUo8GM2XP42Z5gjYlnQCv7nf8",
                            authDomain: "hyundai-voice.firebaseapp.com",
                            projectId: "hyundai-voice",
                            storageBucket: "hyundai-voice.firebasestorage.app",
                            messagingSenderId: "839507725985",
                            appId: "1:839507725985:web:ddc43b8b427dee8b67aae0"
                        };
                        const app = svc.initializeApp(config);
                        const auth = svc.getAuth(app);
                        const db = svc.getFirestore(app);
                        setFb({ auth, db, svc });

                        try {
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await svc.signInWithCustomToken(auth, __initial_auth_token);
                            } else {
                                await svc.signInAnonymously(auth);
                            }
                        } catch (e) { await svc.signInAnonymously(auth); }

                        svc.onAuthStateChanged(auth, (u) => {
                            if (u) { setUser(u); setInitStatus('ready'); }
                        });
                    } catch (err) { setInitStatus('error'); setErrorMessage(err.message); }
                };
                if (window.firebaseServices) init();
                else window.addEventListener('firebase-initialized', init);
            }, []);

            // 2. 동기화
            useEffect(() => {
                if (!fb || !user) return;
                const unsubSub = fb.svc.onSnapshot(fb.svc.collection(fb.db, 'artifacts', APP_ID, 'public', 'data', 'submissions'), (snap) => {
                    setSubmissions(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.timestamp?.seconds||0)-(a.timestamp?.seconds||0)));
                });
                const unsubPopup = fb.svc.onSnapshot(fb.svc.doc(fb.db, 'artifacts', APP_ID, 'public', 'data', 'settings', 'popup'), (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        setPopupConfig(p => ({...p, ...data}));
                        if (data.isActive && view === 'user') setShowPopup(true);
                    }
                });
                const unsubAdmin = fb.svc.onSnapshot(fb.svc.doc(fb.db, 'artifacts', APP_ID, 'public', 'data', 'settings', 'admin'), (snap) => {
                    if (snap.exists()) setAdminPasscode(snap.data().passcode || DEFAULT_PASSCODE);
                });
                return () => { unsubSub(); unsubPopup(); unsubAdmin(); };
            }, [fb, user]); // view를 의존성에서 제거 — view 변경마다 구독 재연결되는 낭비 방지

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [initStatus, view, adminTab, isSuccess, isSubmitting, alertMsg, showPopup, toast, deleteTarget]);

            // 3. 필터링
            const filteredData = useMemo(() => {
                return submissions.filter(s => {
                    if (!s.timestamp) return true;
                    const d = new Date(s.timestamp.seconds * 1000);
                    const start = startDate ? new Date(startDate) : null;
                    const end = endDate ? new Date(endDate) : null;
                    if (end) end.setHours(23, 59, 59);
                    if (start && d < start) return false;
                    if (end && d > end) return false;
                    return true;
                });
            }, [submissions, startDate, endDate]);

            // 4. 기능 핸들러
            const triggerToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };

            const handleImageResize = (e, callback) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        if (w > 600) { h *= 600 / w; w = 600; }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        callback(canvas.toDataURL('image/jpeg', 0.5));
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            };

            const submitForm = async (e) => {
                e.preventDefault();
                if (!fb || !user) return;
                const { brandName, userName, contact, location, description } = formData;
                if (!brandName || !userName || !contact || !location || !description) {
                    setAlertMsg("필수 항목(*)을 작성해 주세요.");
                    return;
                }
                setIsSubmitting(true);
                try {
                    await fb.svc.addDoc(fb.svc.collection(fb.db, 'artifacts', APP_ID, 'public', 'data', 'submissions'), {
                        ...formData, uid: user.uid, timestamp: fb.svc.serverTimestamp()
                    });
                    setIsSuccess(true);
                    window.scrollTo(0, 0);
                } catch (err) { setAlertMsg("제출 실패: " + err.message); }
                finally { setIsSubmitting(false); }
            };

            const saveAdminPass = async () => {
                if (!fb) { setAlertMsg("서버 연결 중입니다. 잠시 후 시도해주세요."); return; }
                if (newPassField.length < 4) { setAlertMsg("4자리 이상 입력하세요."); return; }
                try {
                    await fb.svc.setDoc(fb.svc.doc(fb.db, 'artifacts', APP_ID, 'public', 'data', 'settings', 'admin'), { passcode: newPassField });
                    triggerToast("암호가 변경되었습니다.");
                    setNewPassField('');
                } catch (e) { setAlertMsg("변경 실패"); }
            };

            const confirmDelete = async () => {
                if (!deleteTarget || !fb) return;
                try {
                    await fb.svc.deleteDoc(fb.svc.doc(fb.db, 'artifacts', APP_ID, 'public', 'data', 'submissions', deleteTarget));
                    setDeleteTarget(null);
                    triggerToast("삭제되었습니다.");
                } catch (e) { setAlertMsg("삭제 실패"); }
            };

            // [검증 완료] 엑셀 다운로드 (Native 방식)
            const downloadExcel = async () => {
                try {
                    if (!window.ExcelJS) throw new Error("ExcelJS 라이브러리를 찾을 수 없습니다.");
                    const wb = new window.ExcelJS.Workbook();
                    const ws = wb.addWorksheet('제보리스트');
                    ws.columns = [
                        { header: '날짜', key: 'date', width: 22 },
                        { header: '브랜드', key: 'brand', width: 15 },
                        { header: '성함', key: 'name', width: 10 },
                        { header: '분류', key: 'cat', width: 15 },
                        { header: '위치', key: 'loc', width: 25 },
                        { header: '내용', key: 'desc', width: 50 }
                    ];
                    filteredData.forEach(s => ws.addRow({
                        date: s.timestamp ? new Date(s.timestamp.seconds * 1000).toLocaleString() : '-',
                        brand: s.brandName, name: s.userName, cat: s.category, loc: s.location, desc: s.description
                    }));
                    ws.getRow(1).font = { bold: true };
                    const buffer = await wb.xlsx.writeBuffer();
                    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                    const url = window.URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = `현대면세점_제보데이터_${new Date().toLocaleDateString()}.xlsx`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    window.URL.revokeObjectURL(url);
                    triggerToast("다운로드를 시작합니다.");
                } catch (e) { setAlertMsg("엑셀 생성 중 오류: " + e.message); }
            };

            // --- 5. 렌더링 ---

            if (initStatus === 'loading') return (
                <div className="min-h-screen bg-white flex flex-col items-center justify-center p-6 text-center">
                    <div className="w-12 h-12 border-4 border-[#001c3d] border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="text-slate-400 font-bold text-sm loading-dots keep-all">시스템 연결 중</p>
                </div>
            );

            if (view === 'admin_dashboard') return (
                <div className="min-h-screen bg-slate-100 flex flex-col font-black relative overflow-x-hidden">
                    {/* alertMsg 모달 - admin에도 동일하게 표시 */}
                    {alertMsg && (
                        <div className="fixed inset-0 z-[700] flex items-center justify-center p-6 bg-black/60 backdrop-blur-sm animate-in fade-in">
                            <div className="bg-white rounded-3xl p-8 w-full max-w-xs text-center shadow-2xl animate-pop">
                                <div className="w-14 h-14 bg-orange-50 text-orange-500 rounded-full flex items-center justify-center mx-auto mb-4"><i data-lucide="info"></i></div>
                                <p className="text-sm font-black text-slate-800 mb-6 keep-all">{alertMsg}</p>
                                <button onClick={() => setAlertMsg(null)} className="w-full py-3 bg-[#001c3d] text-white rounded-2xl font-black">확인</button>
                            </div>
                        </div>
                    )}
                    {deleteTarget && (
                        <div className="fixed inset-0 z-[600] flex items-center justify-center p-6 bg-black/60 backdrop-blur-md animate-in fade-in">
                            <div className="bg-white rounded-[35px] p-8 w-full max-w-xs text-center shadow-2xl animate-pop">
                                <div className="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4"><i data-lucide="trash-2"></i></div>
                                <h3 className="text-lg font-black text-slate-900 mb-2">영구 삭제</h3>
                                <p className="text-sm text-slate-400 mb-8 keep-all font-black">이 데이터를 삭제할까요? 복구 불가능합니다.</p>
                                <div className="flex gap-2">
                                    <button onClick={confirmDelete} className="flex-grow py-4 bg-red-500 text-white rounded-2xl font-black">삭제</button>
                                    <button onClick={() => setDeleteTarget(null)} className="flex-grow py-4 bg-slate-100 text-slate-400 rounded-2xl font-black">취소</button>
                                </div>
                            </div>
                        </div>
                    )}
                    <header className="bg-[#001c3d] text-white p-5 sticky top-0 z-50 flex justify-between items-center shadow-lg font-black">
                        <h1 className="font-black text-lg flex items-center gap-2 font-black"><i data-lucide="shield-check" className="text-orange-400"></i>관리자</h1>
                        <button onClick={() => setView('user')} className="p-2 opacity-60 font-black"><i data-lucide="log-out"></i></button>
                    </header>
                    <nav className="bg-white border-b flex font-black">
                        <button onClick={() => setAdminTab('list')} className={`flex-1 py-4 text-xs font-black uppercase ${adminTab === 'list' ? 'text-[#001c3d] border-b-4 border-[#001c3d]' : 'text-slate-300'}`}>제보 현황</button>
                        <button onClick={() => setAdminTab('popup')} className={`flex-1 py-4 text-xs font-black uppercase ${adminTab === 'popup' ? 'text-[#001c3d] border-b-4 border-[#001c3d]' : 'text-slate-300'}`}>팝업 설정</button>
                        <button onClick={() => setAdminTab('security')} className={`flex-1 py-4 text-xs font-black uppercase ${adminTab === 'security' ? 'text-[#001c3d] border-b-4 border-[#001c3d]' : 'text-slate-300'}`}>보안 관리</button>
                    </nav>
                    <main className="p-4 flex-grow space-y-4 max-w-2xl mx-auto w-full">
                        {adminTab === 'list' ? (
                            <div className="space-y-6">
                                <div className="bg-white p-6 rounded-[30px] shadow-sm space-y-4 font-black">
                                    <p className="text-xs font-black text-slate-400">조회 기간 설정</p>
                                    <div className="grid grid-cols-2 gap-2 font-black">
                                        <input type="date" className="p-3 bg-slate-50 rounded-xl text-xs font-black border-none" value={startDate} onChange={e => setStartDate(e.target.value)} />
                                        <input type="date" className="p-3 bg-slate-50 rounded-xl text-xs font-black border-none" value={endDate} onChange={e => setEndDate(e.target.value)} />
                                    </div>
                                    <div className="flex gap-2 font-black">
                                        <button onClick={() => {setStartDate(''); setEndDate('');}} className="flex-1 py-3 bg-slate-100 text-slate-400 rounded-xl text-xs font-black">초기화</button>
                                        <button onClick={downloadExcel} className="flex-[2] py-3 bg-emerald-600 text-white rounded-xl text-xs font-black flex items-center justify-center gap-2"><i data-lucide="file-spreadsheet" className="w-4 h-4"></i> 엑셀 저장</button>
                                    </div>
                                </div>
                                <div className="space-y-4 pb-24 font-black">
                                    <p className="text-[10px] text-slate-400 ml-2">검색 결과: {filteredData.length}건</p>
                                    {filteredData.map(s => (
                                        <div key={s.id} className="bg-white p-6 rounded-[32px] shadow-sm border-2 border-white relative font-black">
                                            <button onClick={() => setDeleteTarget(s.id)} className="absolute top-5 right-5 text-slate-200 hover:text-red-500 font-black"><i data-lucide="trash-2" className="w-5 h-5"></i></button>
                                            <div className="flex gap-2 mb-3"><span className={`text-[10px] font-black px-2 py-1 rounded ${s.category === '위험예방' ? 'bg-orange-500 text-white' : 'bg-slate-100 text-slate-400'}`}>{s.category}</span><span className="text-[10px] text-slate-300 italic font-black">{s.timestamp ? new Date(s.timestamp.seconds * 1000).toLocaleString() : '-'}</span></div>
                                            <p className="text-[15px] font-black text-[#001c3d] mb-1 font-black">[{s.brandName}] {s.userName}</p>
                                            <p className="text-slate-600 text-sm leading-relaxed keep-all bg-slate-50 p-4 rounded-2xl mb-3 font-black">{s.description}</p>
                                            {s.imageData && <img src={s.imageData} className="rounded-2xl w-full h-auto border font-black" />}
                                            <div className="mt-3 pt-3 border-t border-slate-50 text-[10px] text-slate-400 font-bold font-black">📱 {s.contact} | 📍 {s.location}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : adminTab === 'popup' ? (
                            <div className="bg-white p-7 rounded-[40px] shadow-sm space-y-6 animate-in fade-in font-black">
                                <div className="flex justify-between items-center pb-5 border-b font-black">
                                    <h2 className="font-black text-slate-800 text-lg font-black">팝업 제어</h2>
                                    <label className="relative inline-flex items-center cursor-pointer font-black">
                                        <input type="checkbox" className="sr-only peer" checked={popupConfig.isActive} onChange={e => setPopupConfig({...popupConfig, isActive: e.target.checked})} />
                                        <div className="w-14 h-7 bg-slate-200 rounded-full peer peer-checked:after:translate-x-full peer-checked:bg-[#001c3d] after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white after:rounded-full after:h-5 after:w-6 after:transition-all font-black"></div>
                                    </label>
                                </div>
                                <div className="space-y-4 font-black">
                                    <label className="bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl p-6 flex flex-col items-center justify-center cursor-pointer hover:bg-slate-100 font-black">
                                        <input type="file" className="hidden" accept="image/*" onChange={e => handleImageResize(e, (data) => setPopupConfig({...popupConfig, popupImage: data}))} />
                                        <i data-lucide="image-plus" className="text-slate-300 mb-2 w-8 h-8 font-black"></i>
                                        <span className="text-xs text-slate-400 font-black">팝업 이미지 선택</span>
                                    </label>
                                    {popupConfig.popupImage && <div className="relative"><img src={popupConfig.popupImage} className="rounded-xl w-full h-auto max-h-40 object-contain bg-black/5" /><button onClick={() => setPopupConfig({...popupConfig, popupImage: ''})} className="absolute top-2 right-2 bg-red-500 text-white p-1 rounded-full"><i data-lucide="x" className="w-3 h-3"></i></button></div>}
                                    <input type="text" placeholder="제목" className="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold font-black" value={popupConfig.title} onChange={e => setPopupConfig({...popupConfig, title: e.target.value})} />
                                    <input type="text" placeholder="부제목" className="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold font-black" value={popupConfig.subtitle} onChange={e => setPopupConfig({...popupConfig, subtitle: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-2 font-black">
                                        <input type="text" placeholder="리워드 1 명칭" className="p-3 bg-orange-50 rounded-xl text-xs font-bold" value={popupConfig.r1Title} onChange={e => setPopupConfig({...popupConfig, r1Title: e.target.value})} />
                                        <input type="text" placeholder="리워드 1 내용" className="p-3 bg-orange-50 rounded-xl text-xs font-bold" value={popupConfig.r1Value} onChange={e => setPopupConfig({...popupConfig, r1Value: e.target.value})} />
                                        <input type="text" placeholder="리워드 2 명칭" className="p-3 bg-blue-50 rounded-xl text-xs font-bold" value={popupConfig.r2Title || ''} onChange={e => setPopupConfig({...popupConfig, r2Title: e.target.value})} />
                                        <input type="text" placeholder="리워드 2 내용" className="p-3 bg-blue-50 rounded-xl text-xs font-bold" value={popupConfig.r2Value || ''} onChange={e => setPopupConfig({...popupConfig, r2Value: e.target.value})} />
                                    </div>
                                </div>
                                <button onClick={async () => {
                                    try { await fb.svc.setDoc(fb.svc.doc(fb.db, 'artifacts', APP_ID, 'public', 'data', 'settings', 'popup'), popupConfig); triggerToast("저장되었습니다."); } catch (e) { setAlertMsg("실패"); }
                                }} className="w-full py-5 bg-[#001c3d] text-white rounded-[25px] font-black text-lg shadow-xl font-black">설정 저장 및 반영</button>
                            </div>
                        ) : (
                            <div className="bg-white p-8 rounded-[40px] shadow-sm space-y-6 animate-in fade-in font-black">
                                <h2 className="font-black text-slate-800 text-lg">대시보드 패스코드 변경</h2>
                                <div className="space-y-4 font-black">
                                    <p className="text-xs text-slate-400 keep-all font-black">접근 암호를 변경합니다. (최소 4자리)</p>
                                    <input type="text" className="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold border-2 border-blue-50 focus:border-[#001c3d] outline-none font-black" value={newPassField} onChange={e => setNewPassField(e.target.value)} placeholder="새 암호 입력" />
                                </div>
                                <button onClick={saveAdminPass} className="w-full py-5 bg-blue-900 text-white rounded-[25px] font-black text-lg shadow-xl font-black">변경 완료</button>
                            </div>
                        )}
                    </main>
                    {toast && <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[1000] toast-notify px-8 py-4 bg-emerald-500 text-white rounded-full shadow-2xl flex items-center gap-3 font-black"><i data-lucide="check-circle-2"></i><span className="text-sm font-black">{toast}</span></div>}
                </div>
            );

            // [VIEW: USER]
            return (
                <div className="min-h-screen bg-slate-50 flex flex-col relative overflow-x-hidden font-black">
                    {alertMsg && <div className="fixed inset-0 z-[700] flex items-center justify-center p-6 bg-black/60 backdrop-blur-sm animate-in fade-in"><div className="bg-white rounded-3xl p-8 w-full max-w-xs text-center shadow-2xl animate-pop font-black"><div className="w-14 h-14 bg-orange-50 text-orange-500 rounded-full flex items-center justify-center mx-auto mb-4 font-black"><i data-lucide="info"></i></div><p className="text-sm font-black text-slate-800 mb-6 keep-all">{alertMsg}</p><button onClick={() => setAlertMsg(null)} className="w-full py-3 bg-[#001c3d] text-white rounded-2xl font-black">확인</button></div></div>}
                    {showPopup && popupConfig.isActive && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-6 modal-overlay animate-in fade-in font-black">
                            <div className="bg-white rounded-[40px] shadow-2xl w-full max-w-md overflow-hidden animate-pop font-black">
                                {popupConfig.popupImage && <div className="w-full bg-slate-50 flex justify-center"><img src={popupConfig.popupImage} className="w-full h-auto object-contain max-h-[50vh]" /></div>}
                                {(popupConfig.title || popupConfig.subtitle || popupConfig.r1Title) && (
                                    <div className="p-8 space-y-6">
                                        <div className="text-center font-black">
                                            <h3 className="text-2xl font-900 text-[#001c3d] tracking-tighter keep-all">{popupConfig.title}</h3>
                                            {popupConfig.subtitle && <p className="text-sm text-slate-400 italic mt-1 font-black">"{popupConfig.subtitle}"</p>}
                                        </div>
                                        <div className="grid grid-cols-1 gap-3 font-black">
                                            {popupConfig.r1Title && <div className="flex items-center gap-4 bg-orange-50 p-5 rounded-[25px] border border-orange-100 font-black"><div className="w-10 h-10 bg-orange-500 text-white rounded-full flex items-center justify-center shrink-0 font-black"><i data-lucide="coffee"></i></div><div className="text-left font-black"><p className="text-xs text-orange-600 font-bold italic font-black">{popupConfig.r1Title}</p><p className="text-lg font-black text-slate-800 keep-all font-black">{popupConfig.r1Value}</p></div></div>}
                                            {popupConfig.r2Title && <div className="flex items-center gap-4 bg-blue-50 p-5 rounded-[25px] border border-blue-100 font-black"><div className="w-10 h-10 bg-blue-900 text-white rounded-full flex items-center justify-center shrink-0 font-black"><i data-lucide="trophy"></i></div><div className="text-left font-black"><p className="text-xs text-blue-700 font-bold italic font-black">{popupConfig.r2Title}</p><p className="text-lg font-black text-slate-800 keep-all font-black">{popupConfig.r2Value}</p></div></div>}
                                        </div>
                                    </div>
                                )}
                                <div className="p-8 pt-0 font-black">
                                    <button onClick={() => setShowPopup(false)} className="w-full py-5 bg-[#001c3d] text-white rounded-[25px] font-black text-lg shadow-xl tracking-widest font-black">확인했습니다</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {view === 'admin_login' && (
                        <div className="fixed inset-0 z-[400] flex items-center justify-center p-6 bg-slate-50 animate-in zoom-in duration-300">
                            <div className="bg-white p-10 rounded-[50px] shadow-2xl w-full max-w-xs text-center border">
                                <div className="w-16 h-16 bg-blue-50 text-blue-900 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner"><i data-lucide="lock"></i></div>
                                <p className="text-xs text-slate-400 mb-8 font-black uppercase tracking-widest">Admin Auth</p>
                                <input type="password" placeholder="비밀번호" className="w-full p-4 bg-slate-50 rounded-2xl text-center text-lg font-black border-none outline-none focus:ring-2 focus:ring-[#001c3d]/10 mb-4"
                                    value={passInput}
                                    onChange={e => setPassInput(e.target.value)}
                                    onKeyDown={e => { if (e.key === 'Enter') { if (passInput === adminPasscode) { setPassInput(''); setView('admin_dashboard'); } else { triggerToast("암호 오류"); } } }}
                                    autoFocus />
                                <div className="flex gap-2">
                                    <button onClick={() => { if (passInput === adminPasscode) { setPassInput(''); setView('admin_dashboard'); } else { triggerToast("암호 오류"); } }} className="flex-grow py-4 bg-[#001c3d] text-white rounded-2xl font-black shadow-xl">인증</button>
                                    <button onClick={() => { setPassInput(''); setView('user'); }} className="px-5 bg-slate-100 text-slate-400 rounded-2xl font-black">취소</button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {isSuccess ? (
                        <div className="flex-grow flex flex-col items-center justify-center p-10 text-center animate-in fade-in font-black">
                            <i data-lucide="check-circle-2" className="w-24 h-24 text-green-500 mb-8 font-black"></i>
                            <h2 className="text-3xl font-black text-slate-900 mb-4 tracking-tighter leading-tight keep-all font-black">접수가 완료되었습니다!</h2>
                            <p className="text-slate-500 text-sm mb-12 keep-all font-black">총무팀에서 신속하게 확인하겠습니다.</p>
                            <button onClick={() => { setIsSuccess(false); setFormData({brandName:'', userName:'', contact:'', category:'위험예방', location:'', description:'', imageData: ''}); }} className="w-full max-w-sm py-5 bg-[#001c3d] text-white rounded-[25px] font-black text-lg shadow-xl font-black">처음으로 돌아가기</button>
                        </div>
                    ) : (
                        <>
                            <header className="bg-[#001c3d] text-white p-10 rounded-b-[60px] shadow-2xl text-center sticky top-0 z-40 font-black overflow-hidden font-black">
                                <div className="relative z-10 flex flex-col items-center font-black">
                                    <p className="text-orange-400 font-black text-[11px] tracking-[0.5em] mb-3 uppercase">Staff Voice Box</p>
                                    <h1 className="text-4xl font-black tracking-tighter font-black">직원 소리함</h1>
                                    <p className="text-slate-400 text-[13px] font-light mt-2 opacity-70 italic keep-all text-center">무역센터점 임직원 전용 창구</p>
                                </div>
                            </header>
                            <main className="px-5 py-8 space-y-10 animate-in fade-in font-black">
                                <div className="bg-white p-9 space-y-7 shadow-md border border-slate-100 text-center rounded-[45px] font-black">
                                    <p className="text-slate-700 text-[17px] leading-relaxed font-bold tracking-tight keep-all">근무 환경 개선 및 안전 사고 예방을 위해 자유롭게 제안해 주세요.</p>
                                    <div className="space-y-4 text-[14px] text-slate-600 leading-relaxed bg-slate-50 p-7 rounded-[35px] text-left font-bold font-black keep-all font-black">
                                        <p className="font-black"><strong className="text-orange-600 font-black">🚨 위험 예방</strong> : 현장 사고 우려 요인 제보 (Reward 대상)</p>
                                        <p className="font-black"><strong className="text-blue-900 font-black">🛠 시설 관리</strong> : 전기, 보수 민원 접수</p>
                                        <p className="font-black"><strong className="text-slate-800 font-black">📋 일반 민원</strong> : 기타 근무 환경 건의 사항</p>
                                    </div>
                                </div>
                                <form onSubmit={submitForm} className="space-y-12 pb-16 font-black">
                                    <div className="space-y-5 font-black flex flex-col items-center">
                                        <label className="text-[12px] font-black text-slate-400 uppercase tracking-widest keep-all">1. 제안자 정보 (필수) *</label>
                                        <div className="bg-white p-8 rounded-[45px] shadow-xl space-y-5 border border-slate-50 w-full font-black">
                                            <input type="text" placeholder="브랜드명" className="w-full p-5 bg-slate-50 rounded-2xl text-[15px] font-black border-none outline-none shadow-inner" value={formData.brandName} onChange={e => setFormData({...formData, brandName: e.target.value})} />
                                            <div className="grid grid-cols-2 gap-4 font-black">
                                                <input type="text" placeholder="성함" className="w-full p-5 bg-slate-50 rounded-2xl text-[15px] font-black border-none outline-none shadow-inner" value={formData.userName} onChange={e => setFormData({...formData, userName: e.target.value})} />
                                                <input type="tel" placeholder="연락처" className="w-full p-5 bg-slate-50 rounded-2xl text-[15px] font-black border-none outline-none shadow-inner" value={formData.contact} onChange={e => setFormData({...formData, contact: e.target.value.replace(/[^0-9]/g, '')})} />
                                            </div>
                                        </div>
                                    </div>
                                    <div className="space-y-5 font-black flex flex-col items-center">
                                        <label className="text-[12px] font-black text-slate-400 uppercase tracking-widest keep-all font-black">2. 제안 분류 *</label>
                                        <div className="space-y-3 w-full font-black">
                                            {[ {id:'위험예방', label:'🚨 위험 예방'}, {id:'시설관리', label:'🛠 시설 관리'}, {id:'일반민원', label:'📋 일반 민원'} ].map(c => (
                                                <button key={c.id} type="button" onClick={() => setFormData({...formData, category: c.id})} className={`w-full p-6 rounded-[35px] border-2 flex items-center justify-between shadow-sm font-black ${formData.category === c.id ? (c.id === '위험예방' ? 'border-orange-500 bg-orange-50' : 'border-[#001c3d] bg-slate-50') : 'border-white bg-white'}`}><p className={`font-black text-[16px] ${formData.category === c.id ? (c.id === '위험예방' ? 'text-orange-700' : 'text-[#001c3d]') : 'text-slate-800'}`}>{c.label}</p>{formData.category === c.id && <div className={`w-3 h-3 rounded-full animate-pulse ${c.id === '위험예방' ? 'bg-orange-500' : 'bg-[#001c3d]'}`}></div>}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="space-y-5 font-black flex flex-col items-center pt-2 font-black">
                                        <label className="text-[12px] font-black text-slate-400 uppercase tracking-widest keep-all font-black">3. 상세 내용 *</label>
                                        <div className="bg-white p-8 rounded-[45px] shadow-xl border border-slate-50 w-full space-y-4 font-black">
                                            <input type="text" placeholder="위치 (예: 3층 직원식당 입구)" className="w-full p-5 bg-slate-50 rounded-2xl text-[15px] font-black border-none outline-none shadow-inner" value={formData.location} onChange={e => setFormData({...formData, location: e.target.value})} />
                                            <textarea rows="5" placeholder="상황을 구체적으로 설명해 주세요." className="w-full p-6 bg-slate-50 rounded-2xl text-[15px] font-black border-none outline-none shadow-inner leading-relaxed keep-all font-black" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} />
                                        </div>
                                    </div>
                                    <div className="space-y-5 font-black flex flex-col items-center pt-2 font-black">
                                        <label className="text-[12px] font-black text-slate-400 uppercase tracking-widest keep-all font-black">현장 사진 첨부 (선택)</label>
                                        <label className="bg-white p-10 rounded-[45px] border-2 border-dashed border-slate-200 flex flex-col items-center justify-center cursor-pointer w-full font-black active:bg-slate-50 transition-colors font-black">
                                            {/* 카메라 기능: capture 속성 추가하여 모바일 기기에서 바로 카메라를 호출하거나 갤러리를 선택하게 함 */}
                                            <input type="file" className="hidden" accept="image/*" onChange={e => handleImageResize(e, (data) => setFormData({...formData, imageData: data}))} />
                                            <i data-lucide="camera" className="text-slate-300 mb-3 w-12 h-12 font-black"></i>
                                            <span className="text-[14px] font-black text-slate-400">사진 촬영 또는 갤러리 선택</span>
                                        </label>
                                        {formData.imageData && <div className="w-full rounded-[40px] overflow-hidden border-4 border-white shadow-xl animate-in zoom-in font-black"><img src={formData.imageData} className="w-full h-auto" /></div>}
                                    </div>
                                    <button type="submit" disabled={isSubmitting} className={`w-full py-8 rounded-[40px] font-black text-xl shadow-2xl active:scale-95 transition-all text-white font-black ${isSubmitting ? 'bg-slate-400' : 'bg-[#001c3d] shadow-blue-200'}`}>{isSubmitting ? '전송 중...' : '제안 제출하기'}</button>
                                </form>
                                <footer className="text-center pt-8 pb-16 space-y-12 border-t border-slate-100 flex flex-col items-center font-black">
                                    <div className="inline-block bg-white px-12 py-5 rounded-full text-[14px] text-slate-400 font-black shadow-sm border font-black tracking-tighter">문의 (내선): 6011, 6034</div>
                                    <button onClick={() => setView('admin_login')} className="text-[11px] text-slate-300 uppercase tracking-widest flex items-center gap-2 font-black transition-colors font-black"><i data-lucide="settings" className="w-3 h-3 font-black"></i> Admin Access</button>
                                    <p className="text-[10px] text-slate-300 opacity-60 uppercase font-black">© Hyundai Department Store Duty Free</p>
                                </footer>
                            </main>
                        </>
                    )}
                    {toast && <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[1000] toast-notify px-8 py-4 bg-emerald-500 text-white rounded-full shadow-2xl flex items-center gap-3 font-black"><i data-lucide="check-circle-2"></i><span className="text-sm font-black">{toast}</span></div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
